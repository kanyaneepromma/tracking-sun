<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Panel Sun Tracker</title>
    
    <!-- Map Library CSS (Leaflet) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .panel {
            flex: 1;
            min-width: 300px;
        }
        #map {
            height: 400px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        canvas {
            background: #fff;
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
            display: block;
            margin: 0 auto;
        }
        .data-card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .data-card strong {
            color: #d97706;
        }
        h2 { margin-top: 0; color: #2c3e50; }
    </style>
</head>
<body>

    <h1>☀️ Solar Angle Tracker</h1>
    <p>Click anywhere on the map to set your house location. The canvas tracks the sun's path for today.</p>

    <div class="container">
        <!-- Left Panel: Map & Data -->
        <div class="panel">
            <h2>1. Select Location</h2>
            <div id="map"></div>
            <div class="data-card" id="sunData">
                <!-- Data injected via JS -->
            </div>
        </div>

        <!-- Right Panel: Canvas Visualization -->
        <div class="panel">
            <h2>2. Sky Dome (Live Path)</h2>
            <canvas id="sunCanvas" width="400" height="400"></canvas>
            <p style="text-align: center; color: #666; font-size: 0.9em;">
                Center = Straight up (Zenith)<br>Outer edge = Horizon
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <script>
        // 1. Initialize Default Location (San Kamphaeng, Chiang Mai)
        let lat = 18.7441;
        let lng = 99.1226;
        let currentDate = new Date();

        // 2. Setup Map
        const map = L.map('map').setView([lat, lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        let marker = L.marker([lat, lng]).addTo(map);

        // Map Click Event
        map.on('click', function(e) {
            lat = e.latlng.lat;
            lng = e.latlng.lng;
            marker.setLatLng([lat, lng]);
            updateTracker();
        });

        // 3. Main Calculation & Drawing Function
        function updateTracker() {
            currentDate = new Date(); // Update to current time

            // Get sun data
            const times = SunCalc.getTimes(currentDate, lat, lng);
            const pos = SunCalc.getPosition(currentDate, lat, lng);
            
            // SunCalc azimuth is 0 at South. Convert to standard compass (0=North, 90=East)
            const azimuth = (pos.azimuth * 180 / Math.PI + 180) % 360;
            const altitude = pos.altitude * 180 / Math.PI;

            // Update Text Data
            document.getElementById('sunData').innerHTML = `
                <strong>Live Azimuth (Compass):</strong> ${azimuth.toFixed(1)}° <br>
                <strong>Live Elevation (Height):</strong> ${altitude.toFixed(1)}° <br>
                <hr style="border:0; border-top:1px solid #ccc; margin:10px 0;">
                <strong>Sunrise:</strong> ${times.sunrise.toLocaleTimeString()} <br>
                <strong>Sunset:</strong> ${times.sunset.toLocaleTimeString()}
            `;

            drawSkyDome(azimuth, altitude);
        }

        // 4. HTML5 Canvas Drawing Logic
        function drawSkyDome(currentAzimuth, currentAltitude) {
            const canvas = document.getElementById('sunCanvas');
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const maxR = Math.min(cx, cy) - 25; // Outer radius (horizon)

            // Clear previous frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Elevation Grid (Circles for 0°, 30°, 60°)
            ctx.lineWidth = 1;
            for(let alt = 0; alt <= 90; alt += 30) {
                ctx.beginPath();
                const r = maxR * (1 - alt/90);
                ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                ctx.strokeStyle = alt === 0 ? '#333' : '#ddd';
                ctx.stroke();
                
                if (alt > 0 && alt < 90) {
                    ctx.fillStyle = '#999';
                    ctx.font = '10px Arial';
                    ctx.fillText(alt + '°', cx + 2, cy - r - 2);
                }
            }

            // Draw Compass Labels (N, E, S, W)
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('N', cx, cy - maxR - 10);
            ctx.fillText('S', cx, cy + maxR + 10);
            ctx.fillText('E', cx + maxR + 10, cy);
            ctx.fillText('W', cx - maxR - 10, cy);

            // Draw Crosshairs
            ctx.beginPath();
            ctx.moveTo(cx, cy - maxR); ctx.lineTo(cx, cy + maxR);
            ctx.moveTo(cx - maxR, cy); ctx.lineTo(cx + maxR, cy);
            ctx.strokeStyle = '#eee';
            ctx.stroke();

            // Draw Today's Sun Path
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 165, 0, 0.5)';
            ctx.lineWidth = 4;
            let pathStarted = false;

            for(let minutes = 0; minutes < 24 * 60; minutes += 15) {
                let testDate = new Date(currentDate);
                testDate.setHours(0, minutes, 0, 0);
                
                let p = SunCalc.getPosition(testDate, lat, lng);
                let a = p.altitude * 180 / Math.PI;
                if(a < 0) continue; // Skip if sun is below horizon
                
                let az = (p.azimuth * 180 / Math.PI + 180);
                
                // Convert Polar (Azimuth/Altitude) to Cartesian (X/Y)
                let r = maxR * (1 - a/90);
                let radCanvas = (az - 90) * Math.PI / 180; // -90 aligns 0° to top
                let x = cx + r * Math.cos(radCanvas);
                let y = cy + r * Math.sin(radCanvas);

                if(!pathStarted) {
                    ctx.moveTo(x, y);
                    pathStarted = true;
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();

            // Draw Current Sun Position
            if (currentAltitude > 0) {
                let r = maxR * (1 - currentAltitude/90);
                let radCanvas = (currentAzimuth - 90) * Math.PI / 180;
                let x = cx + r * Math.cos(radCanvas);
                let y = cy + r * Math.sin(radCanvas);

                // Glow effect
                ctx.beginPath();
                ctx.arc(x, y, 12, 0, 2*Math.PI);
                ctx.fillStyle = 'rgba(255, 200, 0, 0.4)';
                ctx.fill();

                // Solid sun
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, 2*Math.PI);
                ctx.fillStyle = '#ff9900';
                ctx.fill();
            }
        }

        // 5. Initial Draw & Auto-Refresh
        updateTracker();
        setInterval(updateTracker, 60000); // Update every minute

    </script>
</body>
</html>
