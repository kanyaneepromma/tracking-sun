<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจำลองโซล่าเซลล์ (V.7.1 Fixed Order)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { display: flex; flex-wrap: wrap; gap: 15px; max-width: 1200px; width: 100%; margin-bottom: 20px; }
        .panel { flex: 1; min-width: 320px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #map { height: 300px; border-radius: 8px; border: 2px solid #2c3e50; margin-bottom: 15px; width: 100%; }
        canvas { background: #fff; border-radius: 50%; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); border: 1px solid #ddd; display: block; margin: 0 auto; max-width: 100%; height: auto; }
        .array-card { background: #f8f9fa; border: 1px solid #dee2e6; border-left: 5px solid #0066cc; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .array-card h3 { margin: 0 0 10px 0; font-size: 1.1em; color: #0066cc; display: flex; justify-content: space-between; align-items: center;}
        .delete-btn { background: #dc3545; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 0.8em; }
        .spec-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .spec-input { display: flex; flex-direction: column; font-size: 0.85em; }
        .spec-input input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-top: 3px; font-family: inherit;}
        .slider-box { background: #fff3cd; padding: 12px; border-radius: 6px; font-size: 0.9em;}
        input[type=range] { width: 100%; margin-top: 8px; cursor: pointer; }
        .add-array-btn { width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s; }
        .sim-panel { background: #e8f4f8; border: 1px solid #bee5eb; }
        .live-btn { background: #17a2b8; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em; float: right; margin-top: -3px;}
        .grand-total { background: #d4edda; border: 1px solid #c3e6cb; padding: 20px; border-radius: 8px; color: #155724; width: 100%; text-align: center;}
        h2 { margin-top: 0; color: #2c3e50; font-size: 1.2em; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; line-height: 1.4;}
        .controls-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;}
        .gps-btn { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size:0.9em;}
        .weather-btn { background: #6f42c1; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .weather-status { text-align: center; font-size: 0.9em; margin-top: 10px; font-weight: bold;}
        .custom-arrow-container { display: flex; justify-content: center; align-items: center; }
        .roof-arrow { width: 44px; height: 44px; transition: transform 0.1s ease-out; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.5)); }
        .arrow-text { font-weight: bold; font-family: Arial; font-size: 24px; fill: #000; }
        .weather-info-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-top: 10px; font-size: 0.9em; line-height: 1.6;}
        .warning-banner { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 10px; border-radius: 6px; margin-top: 10px; font-weight: bold; display: none; animation: pulse 2s infinite;}
    </style>
</head>
<body>
    <h1 style="text-align: center; color: #2c3e50; font-size: 1.5em;">☀️ ระบบจำลองโซล่าเซลล์ V.7.1</h1>
    
    <div class="container">
        <div class="panel">
            <div class="controls-header">
                <h2>1. ตำแหน่ง & ชุดแผง</h2>
                <button class="gps-btn" onclick="getUserLocation()">📍 อัปเดต GPS</button>
            </div>
            <div id="map"></div>
            <div id="arraysList"></div>
            <button class="add-array-btn" onclick="addNewArray()">+ เพิ่มชุดแผง</button>
        </div>
        <div class="panel">
            <h2>2. โดมท้องฟ้า (Sky Dome)</h2>
            <canvas id="sunCanvas" width="400" height="400"></canvas>
        </div>
    </div>

    <div class="container">
        <div class="panel sim-panel">
            <h2>3. จำลองเวลา <button class="live-btn" id="btnLive" onclick="setLiveTime()">⌚ เวลาจริง</button></h2>
            <p>เวลา: <strong id="timeLabel" style="color:#d97706;">--:-- น.</strong></p>
            <input type="range" id="timeSlider" min="0" max="1439" value="720" step="15" oninput="handleTimeSlider()">
        </div>
        <div class="panel sim-panel">
            <h2>4. สภาพอากาศ (Weather)</h2>
            <p>ปริมาณเมฆ: <strong id="cloudLabel" style="color:#0066cc;">0%</strong></p>
            <input type="range" id="cloudSlider" min="0" max="100" value="0" step="1" oninput="updateSimulation(true)">
        </div>
    </div>

    <div class="container">
        <div class="panel" style="flex: 2;">
            <div class="grand-total">
                <h2>5. สรุปพยากรณ์ไฟฟ้า (Expected Power)</h2>
                <div id="txtMaxKw">0.00 kW</div>
                <div id="txtLiveKw" style="font-size: 2em; color:#d97706;">0.00 kW</div>
                <div id="txtDailyKwh">0.0 หน่วย</div>
                <div id="arrayBreakdown"></div>
            </div>
        </div>
        <div class="panel">
            <h2>6. ซิงค์ดาวเทียมสด <span id="syncStatus" style="font-size: 0.7em; color: #28a745;">✅ ซิงค์แล้ว</span></h2>
            <button class="weather-btn" onclick="fetchLiveWeather()">☁️ ดึงข้อมูลดาวเทียมสด</button>
            <div id="weatherStatus"></div>
        </div>
    </div>
    
    </body>
</html>
