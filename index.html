<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามดวงอาทิตย์สำหรับโซล่าเซลล์</title>
    
    <!-- Map Library CSS (Leaflet) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .panel {
            flex: 1;
            min-width: 300px;
        }
        #map {
            height: 400px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        canvas {
            background: #fff;
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
            display: block;
            margin: 0 auto;
        }
        .data-card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .data-card strong {
            color: #d97706;
        }
        h2 { margin-top: 0; color: #2c3e50; }
        .loading-location {
            color: #0066cc;
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>☀️ โปรแกรมคำนวณมุมดวงอาทิตย์</h1>
    <p>ระบบจะดึงตำแหน่งปัจจุบันของคุณอัตโนมัติ หรือคุณสามารถคลิกบนแผนที่เพื่อเปลี่ยนตำแหน่งติดตั้งแผงโซล่าเซลล์ได้</p>
    <div id="locationStatus" class="loading-location">กำลังค้นหาตำแหน่งของคุณ...</div>

    <div class="container">
        <!-- ด้านซ้าย: แผนที่และข้อมูล -->
        <div class="panel">
            <h2>1. ตำแหน่งติดตั้ง</h2>
            <div id="map"></div>
            <div class="data-card" id="sunData">
                <!-- ข้อมูลจะถูกดึงมาแสดงที่นี่โดย JS -->
            </div>
        </div>

        <!-- ด้านขวา: โดมจำลองท้องฟ้า -->
        <div class="panel">
            <h2>2. โดมท้องฟ้า (เส้นทางแบบเรียลไทม์)</h2>
            <canvas id="sunCanvas" width="400" height="400"></canvas>
            <p style="text-align: center; color: #666; font-size: 0.9em;">
                จุดศูนย์กลาง = ตรงศีรษะ (มุมเงย 90°)<br>ขอบวงกลมนอกสุด = เส้นขอบฟ้า (มุมเงย 0°)
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <script>
        // 1. ตั้งค่าตำแหน่งเริ่มต้นเป็นพิกัดสำรอง (สันกำแพง เชียงใหม่) เผื่อผู้ใช้ไม่อนุญาตให้เข้าถึง GPS
        let lat = 18.7441;
        let lng = 99.1226;
        let currentDate = new Date();

        // 2. สร้างแผนที่
        const map = L.map('map').setView([lat, lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        let marker = L.marker([lat, lng]).addTo(map);

        // ฟังก์ชันเมื่อคลิกแผนที่
        map.on('click', function(e) {
            lat = e.latlng.lat;
            lng = e.latlng.lng;
            marker.setLatLng([lat, lng]);
            updateTracker();
        });

        // 3. ระบบขอตำแหน่งผู้ใช้อัตโนมัติ (Geolocation API)
        function getUserLocation() {
            const statusEl = document.getElementById('locationStatus');
            
            if (navigator.geolocation) {
                statusEl.style.display = 'block';
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        // ดึงตำแหน่งสำเร็จ
                        lat = position.coords.latitude;
                        lng = position.coords.longitude;
                        
                        // เลื่อนแผนที่ไปที่ตำแหน่งใหม่และย้ายหมุด
                        map.setView([lat, lng], 14);
                        marker.setLatLng([lat, lng]);
                        
                        statusEl.style.display = 'none';
                        updateTracker();
                    },
                    function(error) {
                        // กรณีผู้ใช้กดปฏิเสธ หรือหาพิกัดไม่เจอ
                        statusEl.style.display = 'none';
                        console.warn("ไม่สามารถดึงตำแหน่งได้ จะใช้ตำแหน่งเริ่มต้นแทน");
                        updateTracker();
                    },
                    { timeout: 10000 } // รอสูงสุด 10 วินาที
                );
            } else {
                updateTracker();
            }
        }

        // 4. ฟังก์ชันคำนวณหลักและอัปเดตข้อมูล
        function updateTracker() {
            currentDate = new Date(); 

            // ใช้ไลบรารี SunCalc ดึงค่าดวงอาทิตย์
            const times = SunCalc.getTimes(currentDate, lat, lng);
            const pos = SunCalc.getPosition(currentDate, lat, lng);
            
            // แปลงค่าให้ตรงกับเข็มทิศมาตรฐาน (0=ทิศเหนือ, 90=ตะวันออก)
            const azimuth = (pos.azimuth * 180 / Math.PI + 180) % 360;
            const altitude = pos.altitude * 180 / Math.PI;

            // แสดงข้อมูลเป็นภาษาไทย อ้างอิงเวลาไทย
            document.getElementById('sunData').innerHTML = `
                <strong>มุมทิศ (เข็มทิศ N=0°, E=90°):</strong> ${azimuth.toFixed(1)}° <br>
                <strong>มุมเงย (ความสูงจากขอบฟ้า):</strong> ${altitude.toFixed(1)}° <br>
                <hr style="border:0; border-top:1px solid #ccc; margin:10px 0;">
                <strong>พระอาทิตย์ขึ้น:</strong> ${times.sunrise.toLocaleTimeString('th-TH')} น.<br>
                <strong>พระอาทิตย์ตก:</strong> ${times.sunset.toLocaleTimeString('th-TH')} น.
            `;

            drawSkyDome(azimuth, altitude);
        }

        // 5. วาดโดมจำลองท้องฟ้าบน HTML5 Canvas
        function drawSkyDome(currentAzimuth, currentAltitude) {
            const canvas = document.getElementById('sunCanvas');
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const maxR = Math.min(cx, cy) - 25; 

            // ลบเฟรมเก่า
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดเส้นตารางมุมเงย (0°, 30°, 60°)
            ctx.lineWidth = 1;
            for(let alt = 0; alt <= 90; alt += 30) {
                ctx.beginPath();
                const r = maxR * (1 - alt/90);
                ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                ctx.strokeStyle = alt === 0 ? '#333' : '#ddd';
                ctx.stroke();
                
                if (alt > 0 && alt < 90) {
                    ctx.fillStyle = '#999';
                    ctx.font = '10px Arial';
                    ctx.fillText(alt + '°', cx + 2, cy - r - 2);
                }
            }

            // วาดตัวอักษรทิศ
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('เหนือ (N)', cx, cy - maxR - 10);
            ctx.fillText('ใต้ (S)', cx, cy + maxR + 10);
            ctx.fillText('ออก (E)', cx + maxR + 20, cy);
            ctx.fillText('ตก (W)', cx - maxR - 20, cy);

            // วาดเส้นกากบาทตรงกลาง
            ctx.beginPath();
            ctx.moveTo(cx, cy - maxR); ctx.lineTo(cx, cy + maxR);
            ctx.moveTo(cx - maxR, cy); ctx.lineTo(cx + maxR, cy);
            ctx.strokeStyle = '#eee';
            ctx.stroke();

            // วาดเส้นทางดวงอาทิตย์ทั้งวัน
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 165, 0, 0.5)';
            ctx.lineWidth = 4;
            let pathStarted = false;

            for(let minutes = 0; minutes < 24 * 60; minutes += 15) {
                let testDate = new Date(currentDate);
                testDate.setHours(0, minutes, 0, 0);
                
                let p = SunCalc.getPosition(testDate, lat, lng);
                let a = p.altitude * 180 / Math.PI;
                if(a < 0) continue; 
                
                let az = (p.azimuth * 180 / Math.PI + 180);
                
                let r = maxR * (1 - a/90);
                let radCanvas = (az - 90) * Math.PI / 180; 
                let x = cx + r * Math.cos(radCanvas);
                let y = cy + r * Math.sin(radCanvas);

                if(!pathStarted) {
                    ctx.moveTo(x, y);
                    pathStarted = true;
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();

            // วาดตำแหน่งดวงอาทิตย์ปัจจุบัน
            if (currentAltitude > 0) {
                let r = maxR * (1 - currentAltitude/90);
                let radCanvas = (currentAzimuth - 90) * Math.PI / 180;
                let x = cx + r * Math.cos(radCanvas);
                let y = cy + r * Math.sin(radCanvas);

                // เอฟเฟกต์แสงเรืองรอง
                ctx.beginPath();
                ctx.arc(x, y, 12, 0, 2*Math.PI);
                ctx.fillStyle = 'rgba(255, 200, 0, 0.4)';
                ctx.fill();

                // ตัวดวงอาทิตย์
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, 2*Math.PI);
                ctx.fillStyle = '#ff9900';
                ctx.fill();
            }
        }

        // เริ่มต้นการทำงาน: ขอตำแหน่งผู้ใช้ และตั้ง Auto-Refresh ทุก 1 นาที
        getUserLocation();
        setInterval(updateTracker, 60000); 

    </script>
</body>
</html>
